services:
    postgresql:
        container_name: postgresql
        image: postgres:16
        volumes:
            - postgresql_volume:/var/lib/postgresql/data
        networks:
            - cv-network
        environment:
            POSTGRES_USER: ${POSTGRESQL_USER}
            POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD}
            POSTGRES_DB: ${POSTGRESQL_DATABASE}
            TZ: ${TIMEZONE}
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRESQL_USER} -d ${POSTGRESQL_DATABASE}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        restart: on-failure
        ports:
            - "5432:5432"

    backend:
        container_name: backend
        build:
            context: ./Docker/Backend
            dockerfile: Dockerfile
        volumes:
            - ./backend:/backend
        networks:
            - cv-network
        environment:
            TZ: ${TIMEZONE}
        depends_on:
            postgresql:
                condition: service_healthy
        env_file: .env
        ports:
            - "8000:8000"
        restart: on-failure

    frontend:
        container_name: frontend
        build:
            context: ./Docker/Frontend
            dockerfile: Dockerfile
        volumes:
            - ./frontend:/frontend
        networks:
            - cv-network
        environment:
            TZ: ${TIMEZONE}
        env_file: .env
        ports:
            - "3000:3000"
        restart: on-failure

volumes:
    postgresql_volume:
        driver: local
        driver_opts:
            type: "none"
            o: "bind"
            device: "${POSTGRESQL_VOLUME_PATH}"

networks:
    cv-network:
        driver: bridge
